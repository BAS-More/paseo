services:
  paseo-daemon:
    image: ${PASEO_IMAGE:-ghcr.io/bas-more/paseo/paseo-daemon:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paseo-daemon
    restart: unless-stopped
    ports:
      - "6767:6767"
    volumes:
      - paseo-data:/data/paseo
    env_file:
      - packages/server/.env.production
    environment:
      - NODE_ENV=production
      - PASEO_HOME=/data/paseo
      - PASEO_LISTEN=0.0.0.0:6767
      - PASEO_LOG_FORMAT=json
    secrets:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - PASEO_PASSWORD
    networks:
      - paseo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: paseo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PASEO_DOMAIN=${PASEO_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - paseo-net
    depends_on:
      paseo-daemon:
        condition: service_healthy

volumes:
  paseo-data:
  caddy-data:
  caddy-config:

secrets:
  ANTHROPIC_API_KEY:
    environment: ANTHROPIC_API_KEY
  OPENAI_API_KEY:
    environment: OPENAI_API_KEY
  PASEO_PASSWORD:
    environment: PASEO_PASSWORD

networks:
  paseo-net:
    driver: bridge
