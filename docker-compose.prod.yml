services:
  # ── Paseo daemon (primary) ──────────────────────────────────
  paseo-daemon:
    image: ${PASEO_IMAGE:-ghcr.io/bas-more/paseo/paseo-daemon:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paseo-daemon
    restart: unless-stopped
    # M-12: prevent any single container from taking down the host on OOM
    # or runaway CPU. Tune in production based on observed steady state.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    # Port NOT exposed to host — Caddy reverse proxy is the only entry point.
    # Use `docker exec paseo-daemon curl http://localhost:6767/health/ready` for debugging.
    expose:
      - "6767"
    volumes:
      - paseo-data:/data/paseo
    env_file:
      - packages/server/.env.production
    environment:
      - NODE_ENV=production
      - PASEO_HOME=/data/paseo
      - PASEO_LISTEN=0.0.0.0:6767
      - PASEO_LOG_FORMAT=json
    secrets:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - PASEO_PASSWORD
      - PASEO_AUDIT_HMAC_SECRET
    networks:
      - paseo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Soifer Backend (:3001) ──────────────────────────────────
  soifer-backend:
    image: ${SOIFER_IMAGE:-ghcr.io/bas-more/soifer-backend:latest}
    container_name: soifer-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    expose:
      - "3001"
    env_file:
      - packages/server/.env.production
    environment:
      - NODE_ENV=production
      - SERVER_PORT=3001
    secrets:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
    networks:
      - paseo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── 9Router (:20128) ────────────────────────────────────────
  9router:
    image: ${ROUTER_IMAGE:-ghcr.io/bas-more/9router:latest}
    container_name: 9router
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    expose:
      - "20128"
    env_file:
      - packages/server/.env.production
    environment:
      - NODE_ENV=production
    networks:
      - paseo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:20128/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── CrewAI Bridge (:8000) ───────────────────────────────────
  crewai-bridge:
    image: ${CREWAI_IMAGE:-ghcr.io/bas-more/paseo/crewai-bridge:latest}
    build:
      context: packages/crewai-bridge
      dockerfile: Dockerfile
    container_name: crewai-bridge
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    expose:
      - "8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    networks:
      - paseo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Caddy ──────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: paseo-caddy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PASEO_DOMAIN=${PASEO_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - paseo-net
    depends_on:
      paseo-daemon:
        condition: service_healthy

volumes:
  paseo-data:
  caddy-data:
  caddy-config:

secrets:
  ANTHROPIC_API_KEY:
    environment: ANTHROPIC_API_KEY
  OPENAI_API_KEY:
    environment: OPENAI_API_KEY
  PASEO_PASSWORD:
    environment: PASEO_PASSWORD
  PASEO_AUDIT_HMAC_SECRET:
    environment: PASEO_AUDIT_HMAC_SECRET

networks:
  paseo-net:
    driver: bridge
