services:
  paseo-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paseo-daemon
    restart: unless-stopped
    ports:
      - "6767:6767"
    volumes:
      - paseo-data:/data/paseo
    env_file:
      - packages/server/.env.production
    environment:
      - NODE_ENV=production
      - PASEO_HOME=/data/paseo
      - PASEO_LISTEN=0.0.0.0:6767
      - PASEO_LOG_FORMAT=json
    networks:
      - paseo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # TLS reverse proxy (Phase H2 — uncomment when Caddyfile is created)
