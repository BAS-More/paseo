name: Docker Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "packages/server/**"
      - "packages/highlight/**"
      - "packages/relay/**"
      - "packages/cli/**"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - "Caddyfile"
      - ".github/workflows/deploy-docker.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/paseo-daemon

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        # Pipe through audit-allowlist.mjs so verified-safe findings (e.g.
        # GHSA-rmmr-r34h-pfm5 / GHSA-3q49-cfcf-g5fm — 2026-05-11 supply chain)
        # don't block deploy. Script exits 1 only on un-allowlisted high/critical.
        run: npm audit --omit=dev --json | node scripts/audit-allowlist.mjs

  build:
    runs-on: ubuntu-latest
    needs: [audit]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            # Save current image tag for rollback
            docker compose -f docker-compose.prod.yml ps --format json | jq -r '.[0].Image' > .previous-image || true
            # Pull and restart
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            # Wait for container to be healthy
            sleep 5

      - name: Smoke test
        uses: appleboy/ssh-action@v1
        id: smoke
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:6767/health/live > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
              sleep 3
            done
            echo "Health check failed after 5 attempts"
            exit 1

      - name: Rollback on failure
        if: failure() && steps.smoke.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            PREV_IMAGE=$(cat .previous-image 2>/dev/null || echo "")
            if [ -n "$PREV_IMAGE" ]; then
              echo "Rolling back to: $PREV_IMAGE"
              # Override image and restart
              PASEO_IMAGE="$PREV_IMAGE" docker compose -f docker-compose.prod.yml up -d
              echo "Rollback complete"
            else
              echo "No previous image found, stopping service"
              docker compose -f docker-compose.prod.yml down
            fi
