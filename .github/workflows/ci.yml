name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        # Pipe through audit-allowlist.mjs so verified-safe findings (e.g.
        # GHSA-rmmr-r34h-pfm5 / GHSA-3q49-cfcf-g5fm — 2026-05-11 supply chain)
        # don't block CI. Script exits 1 only on un-allowlisted high/critical.
        run: npm audit --omit=dev --json | node scripts/audit-allowlist.mjs

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Check formatting
        run: npx oxfmt --check .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build highlight dependency
        run: npm run build --workspace=@bas-more/highlight

      - name: Build relay dependency
        run: npm run build --workspace=@bas-more/relay

      - name: Build server dependency
        run: npm run build --workspace=@bas-more/server

      - name: Typecheck all packages
        run: npm run typecheck

  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Fetch origin/main (worktree tests)
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Install dependencies
        run: npm install

      - name: Build highlight dependency
        run: npm run build --workspace=@bas-more/highlight

      - name: Build relay dependency
        run: npm run build --workspace=@bas-more/relay

      - name: Run server tests
        run: npm run test --workspace=@bas-more/server
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  server-tests-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build highlight dependency
        run: npm run build --workspace=@bas-more/highlight

      - name: Build relay dependency
        run: npm run build --workspace=@bas-more/relay

      - name: Run Windows-critical server tests
        working-directory: packages/server
        run: >
          npx vitest run
          src/utils/executable.test.ts
          src/utils/spawn.launch-regression.test.ts
          src/utils/spawn.percent-escape.test.ts
          src/utils/spawn.test.ts
          src/utils/tree-kill.test.ts
          src/utils/run-git-command.test.ts
          src/utils/checkout-git-rev-parse.test.ts
          src/terminal/worker-terminal-manager.test.ts
          src/server/agent/provider-registry.test.ts
          src/server/agent/provider-launch-config.test.ts
          src/server/agent/provider-snapshot-manager.test.ts
          src/server/agent/providers/claude-agent.spawn.test.ts
          src/server/agent/providers/provider-windows-launch.test.ts
          src/server/agent/providers/provider-availability.test.ts
          src/server/workspace-registry-model.test.ts
          src/server/persisted-config.test.ts
          src/server/bootstrap-provider-availability.test.ts

  desktop-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build highlight dependency
        run: npm run build --workspace=@bas-more/highlight

      - name: Build relay dependency
        run: npm run build --workspace=@bas-more/relay

      - name: Build server dependency
        run: npm run build --workspace=@bas-more/server

      - name: Run desktop tests
        run: npm run test --workspace=@bas-more/desktop

  app-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build highlight dependency
        run: npm run build --workspace=@bas-more/highlight

      - name: Run app unit tests
        run: npm run test --workspace=@bas-more/app

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # --include=optional is the npm default but be explicit — some hosted
      # runners override it via .npmrc. We need lightningcss-linux-x64-gnu
      # (metro's CSS bundler) and the SDK platform binaries below.
      - name: Install dependencies
        run: npm install --include=optional

      # Belt-and-suspenders: `npm install --include=optional` sometimes still
      # leaves the lightningcss platform sibling package empty in cached CI
      # envs (npm/cli#4828). Without the .node binary metro's web bundler
      # fails hard with `Cannot find module '../lightningcss.linux-x64-gnu.node'`.
      # Rebuild forces the postinstall fetch; if the package dir is still
      # missing, install the sibling explicitly.
      - name: Ensure lightningcss native binary is present
        run: |
          npm rebuild lightningcss || true
          if [ ! -d node_modules/lightningcss-linux-x64-gnu ]; then
            echo "::warning::lightningcss-linux-x64-gnu missing after rebuild; installing explicitly"
            npm install --no-save lightningcss-linux-x64-gnu@1.30.1
          fi
          ls node_modules/lightningcss-linux-x64-gnu/ 2>&1 | head -5

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build highlight dependency
        run: npm run build --workspace=@bas-more/highlight

      - name: Build relay dependency
        run: npm run build --workspace=@bas-more/relay

      - name: Build server dependency
        run: npm run build --workspace=@bas-more/server

      - name: Install agent CLIs for provider tests
        run: npm install -g @openai/codex@0.105.0 opencode-ai

      - name: Run Playwright E2E tests
        run: npm run test:e2e --workspace=@bas-more/app
        env:
          # server-tests passes both auth secrets; playwright was only passing
          # OPENAI_API_KEY, which left the Claude SDK unauthenticated in agent
          # fallback chains. The unauth response is an error payload that fails
          # the structured-agent JSON schema check, cascading to
          # `Agent response did not match the required JSON schema`.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: |
            packages/app/test-results/
            packages/app/playwright-report/
          retention-days: 7

  relay-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build relay
        run: npm run build --workspace=@bas-more/relay

      - name: Run relay tests
        run: npm run test --workspace=@bas-more/relay

  cli-tests:
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    runs-on: ubuntu-latest
    name: cli-tests (shard ${{ matrix.shard }}/3)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # --include=optional is the npm default but be explicit — some hosted
      # runners override it via .npmrc. Needed for SDK platform binaries.
      - name: Install dependencies
        run: npm install --include=optional

      - name: Install agent CLIs for provider tests
        run: npm install -g @openai/codex@0.105.0 opencode-ai

      - name: Build highlight dependency
        run: npm run build --workspace=@bas-more/highlight

      - name: Run CLI tests
        run: npm run test --workspace=@bas-more/cli
        env:
          PASEO_LOCAL_SPEECH_AUTO_DOWNLOAD: "0"
          PASEO_DICTATION_ENABLED: "0"
          PASEO_VOICE_MODE_ENABLED: "0"
          PASEO_CLI_TEST_SHARD: ${{ matrix.shard }}
          PASEO_CLI_TEST_SHARD_TOTAL: "3"
